name: build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dioxus CLI
        shell: pwsh
        run: |
          iwr https://dioxuslabs.com/install.ps1 -useb | iex
          echo "$HOME\.dioxus\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: cargo test --locked

      - name: Build
        run: dx build --platform desktop --locked
