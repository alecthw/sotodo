name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dioxus CLI
        shell: pwsh
        run: |
          iwr https://dioxuslabs.com/install.ps1 -useb | iex
          echo "$HOME\.dioxus\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: cargo test --locked

      - name: Build release
        env:
          SOTODO_VERSION: ${{ github.ref_name }}
        run: dx build --platform desktop --release --locked

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\dx\sotodo\release\windows\app\sotodo.exe dist\sotodo.exe

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME dist\sotodo.exe --title $env:GITHUB_REF_NAME --notes "Windows desktop build."
